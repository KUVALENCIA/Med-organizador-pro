<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Médico Pro - Cuidadores</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="app_icon.png">
    <meta name="theme-color" content="#00796b">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #00796b;
            --bg-color: #e0f2f1;
            --danger-color: #e53935;
            --card-bg: #ffffff;
            --secondary-color: #757575;
            --camera-color: #ff9800;
            --whatsapp-color: #25D366;
            --edit-color: #f57c00; /* Color para el botón de modificar */
        }
        html, body {
            height: auto;
            min-height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: #333;
        }
        h2, h3 {
            color: var(--primary-color);
            text-align: center;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #444;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .input-camera {
            border: 2px solid var(--camera-color);
            background-color: #fff3e0;
        }
        .frecuencia-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: background-color 0.3s;
        }
        button:disabled {
            background-color: #999 !important;
            cursor: not-allowed;
        }
        button.export-btn {
            background-color: #1e88e5;
            margin-top: 20px;
        }
        .btn-limpiar {
            background-color: var(--secondary-color);
            margin-top: 10px;
        }
        
        /* Contenedor para botones de cada medicina */
        .acciones-medicamento {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-modificar {
            background-color: var(--edit-color);
            margin-top: 0;
            padding: 8px;
            font-size: 14px;
        }
        .btn-eliminar {
            background-color: var(--danger-color);
            margin-top: 0;
            padding: 8px;
            font-size: 14px;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-color);
            color: white;
            border: none;
            padding: 8px;
            margin-top: 10px;
            border-radius: 4px;
            width: 100%;
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
        }
        .paciente-grupo {
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #ffffff;
        }
        .paciente-titulo-contenedor {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            margin: -15px -15px 15px -15px;
            border-radius: 6px 6px 0 0;
            text-align: center;
        }
        .paciente-datos-extra {
            font-size: 14px;
            margin-top: 8px;
            background-color: rgba(0,0,0,0.15);
            padding: 6px;
            border-radius: 4px;
            display: inline-block;
        }
        .btn-borrar-paciente {
            background-color: #b71c1c;
            color: white;
            border: none;
            padding: 8px;
            margin-top: 10px;
            border-radius: 4px;
            width: 100%;
        }
        .medicamento-item {
            border-bottom: 1px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 15px;
            page-break-inside: avoid !important;
        }
        .medicamento-item img {
            max-width: 120px;
            margin-top: 10px;
            border-radius: 5px;
            display: block;
        }
        .proxima-toma {
            color: #d84315;
            font-weight: bold;
            background: #fbe9e7;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="card" id="formCard">
        <h2>Registro Múltiple de Pacientes</h2>
        <div id="contenedorFormulario">
            
            <label>Nombre del Paciente:</label>
            <input type="text" id="paciente" list="listaPacientesOpciones" placeholder="Escriba el nombre" oninput="autocompletarPaciente()">
            <datalist id="listaPacientesOpciones"></datalist>

            <label>Fecha de Nacimiento:</label>
            <input type="date" id="fechaNacimiento" onchange="calcularEdad()">

            <label>Edad:</label>
            <input type="number" id="edad" placeholder="Se calcula automáticamente" min="0">

            <label>Fecha de Inicio del Tratamiento:</label>
            <input type="date" id="fechaInicio">

            <label>Medicamento:</label>
            <input type="text" id="medicamento" placeholder="Nombre del fármaco">

            <label>📷 Tomar Foto (Cámara Directa):</label>
            <input type="file" id="fotoCamara" accept="image/*" capture="environment" class="input-camera">

            <label>📁 Seleccionar de Galería:</label>
            <input type="file" id="fotoGaleria" accept="image/*">

            <label>Gramaje y Dosis:</label>
            <input type="text" id="gramaje" placeholder="Ej. 500mg - 1 tableta">

            <label>Frecuencia de Toma:</label>
            <div class="frecuencia-inputs">
                <input type="number" id="frecuenciaNum" placeholder="Ej: 8" min="1">
                <select id="frecuenciaTipo">
                    <option value="horas">Hora(s)</option>
                    <option value="días">Día(s)</option>
                    <option value="semanas">Semana(s)</option>
                    <option value="meses">Mes(es)</option>
                </select>
            </div>

            <label>Hora de la primera toma:</label>
            <input type="time" id="hora">

            <button type="button" id="btnAgregar" onclick="procesarFormulario()">➕ Agregar a la Lista</button>
            <button type="button" class="btn-limpiar" onclick="limpiarTodoElFormulario()">🔄 Nuevo Paciente (Limpiar Todo)</button>
        </div>
    </div>

    <div class="card" id="areaImpresion">
        <div id="listaMedicamentos">
            <p style="text-align:center; color:#777;">Sin datos.</p>
        </div>
    </div>

    <button type="button" class="export-btn" id="btnExportar" onclick="exportarPDF()">📄 Exportar PDF (Páginas separadas)</button>

    <script>
        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
              console.log('ServiceWorker fallo: ', err);
            });
          });
        }
        
        let medicamentos = [];
        document.getElementById('fechaInicio').valueAsDate = new Date();

        // SISTEMA INTELIGENTE DE GUARDADO Y RESCATE DE HISTORIAL
        function guardarEnMemoria() {
            let guardadoExitoso = false;
            let alertaMostrada = false;

            while (!guardadoExitoso) {
                try {
                    localStorage.setItem('datosMedicosGuardados', JSON.stringify(medicamentos));
                    guardadoExitoso = true;
                } catch(e) {
                    let fotoBorrada = false;
                    for (let i = 0; i < medicamentos.length; i++) {
                        if (medicamentos[i].foto && medicamentos[i].foto !== "") {
                            medicamentos[i].foto = ""; 
                            fotoBorrada = true;
                            
                            if (!alertaMostrada) {
                                alert("⚙️ Optimización Automática: La memoria de tu celular se llenó. Para proteger el historial del paciente, la aplicación ha quitado las fotos más antiguas. ¡Tus registros están a salvo!");
                                alertaMostrada = true;
                            }
                            break; 
                        }
                    }

                    if (!fotoBorrada) {
                        alert("🚨 Alerta Crítica: El almacenamiento está saturado al 100%. Por favor elimina un paciente antiguo para continuar.");
                        medicamentos.pop(); 
                        break;
                    }
                }
            }
        }

        // Carga Segura de Memoria
        function cargarDeMemoria() {
            const datos = localStorage.getItem('datosMedicosGuardados');
            if(datos) {
                try {
                    medicamentos = JSON.parse(datos);
                    medicamentos.forEach(med => {
                        if(med.siguienteAlarma) {
                            med.siguienteAlarma = new Date(med.siguienteAlarma);
                        }
                    });
                    mostrarLista();
                } catch(e) {
                    console.log("Error leyendo memoria", e);
                }
            }
        }

        cargarDeMemoria();

        function autocompletarPaciente() {
            const nombreIngresado = document.getElementById('paciente').value.trim().toUpperCase();
            const pacienteExistente = medicamentos.find(m => m.paciente === nombreIngresado);
            if(pacienteExistente) {
                if(pacienteExistente.fechaNacimiento) {
                    document.getElementById('fechaNacimiento').value = pacienteExistente.fechaNacimiento;
                    calcularEdad();
                }
            }
        }

        function calcularEdad() {
            const fechaNac = document.getElementById('fechaNacimiento').value;
            if (fechaNac) {
                const hoy = new Date();
                const cumpleanos = new Date(fechaNac);
                let edadCalculada = hoy.getFullYear() - cumpleanos.getFullYear();
                const mes = hoy.getMonth() - cumpleanos.getMonth();
                
                if (mes < 0 || (mes === 0 && hoy.getDate() < cumpleanos.getDate())) {
                    edadCalculada--;
                }
                document.getElementById('edad').value = edadCalculada;
            }
        }

        function limpiarTodoElFormulario() {
            document.getElementById('paciente').value = '';
            document.getElementById('fechaNacimiento').value = '';
            document.getElementById('edad').value = '';
            document.getElementById('fechaInicio').valueAsDate = new Date();
            document.getElementById('medicamento').value = '';
            document.getElementById('fotoCamara').value = '';
            document.getElementById('fotoGaleria').value = '';
            document.getElementById('gramaje').value = '';
            document.getElementById('frecuenciaNum').value = '';
            document.getElementById('frecuenciaTipo').value = 'horas';
            document.getElementById('hora').value = '';
        }

        function procesarImagen(archivo, callback) {
            const lector = new FileReader();
            lector.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    try {
                        const canvas = document.createElement('canvas');
                        const anchoMaximo = 300; 
                        let proporcion = anchoMaximo / img.width;
                        if(proporcion > 1) proporcion = 1;
                        
                        canvas.width = img.width * proporcion;
                        canvas.height = img.height * proporcion;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        callback(canvas.toDataURL('image/jpeg', 0.6));
                    } catch (error) {
                        callback("");
                    }
                };
                img.src = e.target.result;
            };
            lector.readAsDataURL(archivo);
        }

        function procesarFormulario() {
            const pac = document.getElementById('paciente').value.trim().toUpperCase();
            const fNac = document.getElementById('fechaNacimiento').value;
            const edadPac = document.getElementById('edad').value.trim();
            const fIn = document.getElementById('fechaInicio').value;
            const med = document.getElementById('medicamento').value.trim();
            const gra = document.getElementById('gramaje').value.trim();
            const fNum = parseInt(document.getElementById('frecuenciaNum').value);
            const fTip = document.getElementById('frecuenciaTipo').value;
            const hor = document.getElementById('hora').value;

            if(!pac || !fNac || !edadPac || !fIn || !med || isNaN(fNum) || !hor || !gra) {
                alert("Por favor, complete todos los campos obligatorios."); return;
            }

            const btn = document.getElementById('btnAgregar');
            btn.disabled = true; btn.innerText = "Guardando...";

            const fotoCamara = document.getElementById('fotoCamara').files[0];
            const fotoGaleria = document.getElementById('fotoGaleria').files[0];
            const archivoSeleccionado = fotoCamara || fotoGaleria;

            const guardar = (url) => {
                const [y, m, d] = fIn.split('-');
                const [h, min] = hor.split(':');
                
                medicamentos.push({
                    paciente: pac, 
                    fechaNacimiento: fNac, 
                    edad: edadPac,
                    fechaInicio: fIn, 
                    medicamento: med,
                    gramaje: gra, 
                    frecuenciaNum: fNum, 
                    frecuenciaTipo: fTip,
                    foto: url, 
                    siguienteAlarma: new Date(y, m-1, d, h, min)
                });
                
                guardarEnMemoria(); 
                
                document.getElementById('medicamento').value = '';
                document.getElementById('fotoCamara').value = '';
                document.getElementById('fotoGaleria').value = '';
                document.getElementById('gramaje').value = '';
                document.getElementById('frecuenciaNum').value = '';
                document.getElementById('hora').value = '';
                
                mostrarLista();
                btn.disabled = false; btn.innerText = "➕ Agregar a la Lista";
            };

            if(archivoSeleccionado) {
                procesarImagen(archivoSeleccionado, guardar);
            } else {
                guardar("");
            }
        }

        function eliminarPaciente(nombre) {
            if(confirm(`¿Desea borrar a ${nombre} de la aplicación?`)) {
                medicamentos = medicamentos.filter(m => m.paciente !== nombre);
                guardarEnMemoria();
                mostrarLista();
            }
        }

        function eliminarMedicamento(index) {
            if(confirm("¿Borrar este medicamento específico?")) {
                medicamentos.splice(index, 1);
                guardarEnMemoria();
                mostrarLista();
            }
        }

        // NUEVA FUNCIÓN: Modificar la Dosis de un medicamento
        function modificarDosis(index) {
            const dosisActual = medicamentos[index].gramaje;
            const nuevaDosis = prompt(`Ingresa la nueva dosis o gramaje para ${medicamentos[index].medicamento}:`, dosisActual);
            
            if (nuevaDosis !== null && nuevaDosis.trim() !== "") {
                medicamentos[index].gramaje = nuevaDosis.trim();
                guardarEnMemoria();
                mostrarLista();
                alert("✅ Dosis actualizada correctamente.");
            }
        }

        function enviarWhatsApp(nombrePaciente) {
            const medsPaciente = medicamentos.filter(m => m.paciente === nombrePaciente);
            if(medsPaciente.length === 0) return;

            const datosPac = medsPaciente[0];
            const fNac = datosPac.fechaNacimiento ? datosPac.fechaNacimiento.split('-').reverse().join('/') : '--/--/----';
            const edad = datosPac.edad ? datosPac.edad : '--';

            let texto = `🏥 *REPORTE MÉDICO* 🏥\n\n`;
            texto += `👤 *Paciente:* ${nombrePaciente}\n`;
            texto += `🎂 *Nacimiento:* ${fNac}\n`;
            texto += `⏳ *Edad:* ${edad} años\n\n`;
            texto += `📋 *Tratamientos Activos:*\n`;

            medsPaciente.forEach(m => {
                // Formateamos la fecha de inicio para que se vea bonita en WhatsApp
                const fInicioFormato = m.fechaInicio ? m.fechaInicio.split('-').reverse().join('/') : '--/--/----';
                
                texto += `\n💊 *${m.medicamento}* (${m.gramaje})\n`;
                texto += `   📅 *Inicio:* ${fInicioFormato}\n`;
                texto += `   ⏱️ *Frecuencia:* Cada ${m.frecuenciaNum} ${m.frecuenciaTipo}\n`;
            });

            texto += `\n-----------------------\n`;
            texto += `_Reporte generado desde Organizador Médico Pro_ 🩺`;

            const textoCodificado = encodeURIComponent(texto);
            window.open(`https://wa.me/?text=${textoCodificado}`, '_blank');
        }

        function mostrarLista() {
            const cont = document.getElementById('listaMedicamentos');
            const dList = document.getElementById('listaPacientesOpciones');
            if(medicamentos.length === 0) {
                cont.innerHTML = '<p style="text-align:center; color:#777;">Sin datos.</p>';
                dList.innerHTML = ""; return;
            }

            const grupos = {};
            medicamentos.forEach((m, i) => {
                if(!grupos[m.paciente]) grupos[m.paciente] = [];
                grupos[m.paciente].push({data: m, id: i});
            });

            let html = "";
            let opciones = "";
            let primerPaciente = true;

            for(const pac in grupos) {
                opciones += `<option value="${pac}">`;
                if (!primerPaciente) html += `<div class="html2pdf__page-break"></div>`;
                primerPaciente = false;

                const datosPac = grupos[pac][0].data;
                const fNac = datosPac.fechaNacimiento ? datosPac.fechaNacimiento.split('-').reverse().join('/') : '--/--/----';
                const edad = datosPac.edad ? datosPac.edad : '--';

                html += `
                    <div class="paciente-grupo">
                        <div class="paciente-titulo-contenedor">
                            <h4>👤 Paciente: ${pac}</h4>
                            <div class="paciente-datos-extra">
                                🎂 Nacimiento: ${fNac} &nbsp;|&nbsp; ⏳ Edad: ${edad} años
                            </div>
                            <button class="btn-whatsapp" data-html2canvas-ignore="true" onclick="enviarWhatsApp('${pac}')">📲 Enviar Reporte por WhatsApp</button>
                            <button class="btn-borrar-paciente" data-html2canvas-ignore="true" onclick="eliminarPaciente('${pac}')">🗑️ Borrar Paciente</button>
                        </div>
                `;

                grupos[pac].forEach(item => {
                    const m = item.data;
                    const f = m.siguienteAlarma.toLocaleString();
                    const fInicioTexto = m.fechaInicio ? m.fechaInicio.split('-').reverse().join('/') : '--/--/----';

                    html += `
                        <div class="medicamento-item">
                            <p><strong>Medicamento:</strong> ${m.medicamento} (${m.gramaje})</p>
                            <p><strong>📅 Inicio de toma:</strong> ${fInicioTexto}</p>
                            <p><strong>Frecuencia:</strong> Cada ${m.frecuenciaNum} ${m.frecuenciaTipo}</p>
                            <p class="proxima-toma">⏳ Próxima: ${f}</p>
                            ${m.foto ? `<img src="${m.foto}">` : ""}
                            
                            <div class="acciones-medicamento" data-html2canvas-ignore="true">
                                <button class="btn-modificar" onclick="modificarDosis(${item.id})">✏️ Modificar Dosis</button>
                                <button class="btn-eliminar" onclick="eliminarMedicamento(${item.id})">🗑️ Eliminar</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            cont.innerHTML = html;
            dList.innerHTML = opciones;
        }

        function exportarPDF() {
            if(medicamentos.length === 0) return alert("Lista vacía");
            const btn = document.getElementById('btnExportar');
            btn.innerText = "Generando Reporte..."; btn.disabled = true;

            const opt = {
                margin: 10,
                filename: 'Reporte_Historial_Pacientes.pdf',
                pagebreak: { mode: ['css', 'avoid-all'] },
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(document.getElementById('areaImpresion')).save().then(() => {
                btn.innerText = "📄 Exportar PDF (Páginas separadas)"; btn.disabled = false;
            }).catch(e => {
                alert("Error al crear PDF. El archivo es muy grande.");
                btn.innerText = "📄 Exportar PDF (Páginas separadas)"; btn.disabled = false;
            });
        }

        setInterval(() => {
            let ahora = new Date();
            let cambio = false;
            medicamentos.forEach(m => {
                if(ahora >= m.siguienteAlarma) {
                    alert(`⏰ ALARMA: ${m.paciente}\nTomar: ${m.medicamento} (${m.gramaje})`);
                    let proxima = new Date(m.siguienteAlarma);
                    while(proxima <= ahora) {
                        if(m.frecuenciaTipo === 'horas') proxima.setHours(proxima.getHours() + m.frecuenciaNum);
                        else if(m.frecuenciaTipo === 'días') proxima.setDate(proxima.getDate() + m.frecuenciaNum);
                        else if(m.frecuenciaTipo === 'semanas') proxima.setDate(proxima.getDate() + (m.frecuenciaNum * 7));
                        else if(m.frecuenciaTipo === 'meses') proxima.setMonth(proxima.getMonth() + m.frecuenciaNum);
                    }
                    m.siguienteAlarma = proxima;
                    cambio = true;
                }
            });
            if(cambio) {
                guardarEnMemoria();
                mostrarLista();
            }
        }, 15000);
    </script>
</body>
</html>
